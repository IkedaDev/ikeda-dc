name: Build and Deploy Discord Bot

on:
  push:
    branches: ["main", "develop"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ikedaharket/ikeda-dc:${{ steps.vars.outputs.sha_short }}
          platforms: linux/arm64

      - name: Update Infra Repo
        run: |
          # Definimos las rutas del bot en tus entornos prod/qa dentro de tu monorepo de infra
          TARGET_DIR=${{ github.ref_name == 'main' && 'tenants/ikedadev/prod/ikeda-dc/discord' || 'tenants/ikedadev/ikeda-dc/qa/ikeda-dc/discord' }}
          
          git config --global user.email "bot@ikedadev.com"
          git config --global user.name "IkedaDev Bot"
          
          # Clonamos usando tu token de acceso secreto
          git clone https://x-access-token:${{ secrets.INFRA_REPO_TOKEN }}@github.com/IkedaDev/ikedadev-infra
          cd ikedadev-infra
          
          # Reemplaza la etiqueta de la imagen vieja por el nuevo SHA corto en tu archivo deployment.yaml
          sed -i "s|image: ikedaharket/ikeda-dc:.*|image: ikedaharket/ikeda-dc:${{ steps.vars.outputs.sha_short }}|g" ${TARGET_DIR}/deployment.yaml
          
          git add .
          git commit -m "chore: update bot image to ${{ steps.vars.outputs.sha_short }} (${{ github.ref_name }})"
          git push